name: Static analysis PHP (comment trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  phpstan:
    name: Run phpstan
    runs-on: ubuntu-latest
    if: >
      github.event.issue.pull_request &&
      github.event.comment.author_association == 'OWNER' &&
      contains(github.event.comment.body, '/phpstan')
    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "eyes",
            });

      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput("sha", pr.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Run composer install
        run: composer install -n --prefer-dist

      - name: Run phpstan
        id: phpstan
        run: composer phpstan

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = "${{ steps.phpstan.outcome }}";
            const emoji = outcome === "success" ? "✅" : "❌";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} \`composer phpstan\` ${outcome === "success" ? "passed" : "failed"} on ${{ steps.pr.outputs.sha }}. [View run](${runUrl})`,
            });
